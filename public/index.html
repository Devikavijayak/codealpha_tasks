<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Social - Connect & Share</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fa-solid fa-fire"></i> MiniSocial
            </div>
            <div class="nav-links">
                <a href="#" class="active" id="nav-feed"><i class="fa-solid fa-house"></i> Feed</a>
                <a href="#" id="nav-profile"><i class="fa-solid fa-user"></i> Profile</a>
            </div>
            <div class="user-menu" id="current-user-info">
                <!-- Current user avatar and name will be injected here -->
                <div class="skeleton-avatar"></div>
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Sidebar Profile (Optional for desktop view) -->
        <aside class="sidebar" id="sidebar-profile">
            <!-- Populated via JS -->
            <div class="skeleton-card"></div>
        </aside>

        <!-- Main Feed Area -->
        <section class="feed-area">
            <div class="create-post-card">
                <div class="create-post-header">
                    <img src="" alt="avatar" id="create-post-avatar" class="avatar" style="display: none;">
                    <textarea id="post-content" placeholder="What's on your mind?"></textarea>
                </div>
                <div class="create-post-footer">
                    <button class="btn-primary" id="btn-post">Post</button>
                </div>
            </div>

            <div id="posts-container">
                <!-- Posts will be injected here -->
                <div class="skeleton-card" style="height: 200px; margin-top: 20px;"></div>
                <div class="skeleton-card" style="height: 200px; margin-top: 20px;"></div>
            </div>
        </section>

        <!-- Right sidebar for suggestions/trending (Optional) -->
        <aside class="right-sidebar">
            <div class="card suggestions-card">
                <h3>Who to follow</h3>
                <div id="suggestions-container">
                    <!-- Suggestions -->
                </div>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
